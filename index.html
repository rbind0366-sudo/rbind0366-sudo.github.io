body{

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
z-index:1000;

nav h2{color:#38bdf8;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
}
.hero h1{
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
-webkit-background-clip:text;
color:transparent;
}
.hero p{margin:15px 0;font-size:18px;}

.btn{
padding:14px 30px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
border-radius:30px;
color:#fff;
font-weight:bold;
}

/* SERVICES */
section{padding:100px 60px;}
h2{text-align:center;margin-bottom:40px;}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #38bdf8;
}

.price{color:#38bdf8;margin-top:10px;}

/* PORTFOLIO */
.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.portfolio img{
width:100%;
border-radius:15px;
}

/* CONTACT */
.contact{
text-align:center;
}
.contact a{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:30px;
background:#38bdf8;
}

/* FLOAT BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#020617;
}
</style>
