<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:#fff;overflow-x:hidden;}

nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}
nav h2{color:#38bdf8;}

.hero{
height:100vh;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
text-align:center;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
}
.hero h1{
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
-webkit-background-clip:text;
color:transparent;
}
.hero p{margin:20px 0;}

.btn{
padding:15px 30px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
border-radius:30px;
cursor:pointer;
transition:0.3s;
}
.btn:hover{transform:scale(1.1);}

section{padding:100px 60px;}
h2{text-align:center;margin-bottom:40px;}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}
.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
transition:0.4s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #38bdf8;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.portfolio img{width:100%;border-radius:15px;}

.contact{text-align:center;}
.contact a{
display:inline-block;
margin:10px;
padding:12px 25px;
background:#38bdf8;
border-radius:30px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* animation */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}
</style>

</head>

<body>

<nav>

<p>Modern UI</p>
</div>

</div>

<div class="portfolio">

<img src="https://images.unsplash.com/photo-1508780709619-79562169bc64">
</div>
</section>

<section class="contact fade">

<script>
const elements=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
elements.forEach(el=>{
const top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){
el.classList.add('show');
}
});
});
</script>

</body>
</html>
