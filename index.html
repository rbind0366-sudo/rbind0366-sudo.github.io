<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelHub - Your Creative Digital Partner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
body{background:#0f172a;color:#fff;}
html{scroll-behavior:smooth;}

nav{
display:flex;justify-content:space-between;
padding:15px 50px;background:#020617;
position:fixed;width:100%;top:0;
}
nav h2{color:#38bdf8;}

.hero{
height:100vh;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c') center/cover;
}

.hero h1{font-size:50px;background:rgba(0,0,0,0.6);padding:10px;}
.hero p{background:rgba(0,0,0,0.6);padding:5px;}

.btn{
padding:12px 25px;background:#38bdf8;
border-radius:6px;margin-top:10px;
}

section{padding:80px 50px;}
h2{text-align:center;margin-bottom:30px;color:#38bdf8;}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;padding:20px;
border-radius:12px;text-align:center;
transition:0.3s;
}
.card:hover{transform:scale(1.05);}

.price{color:#38bdf8;margin-top:10px;}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.portfolio img{
width:100%;border-radius:10px;
}

footer{text-align:center;padding:20px;background:#020617;}
</style>

</head>

<body>

<nav>
<h2>PixelHub</h2>
</nav>

<div class="hero">
<h1>PixelHub</h1>
<p>Your Creative Digital Partner</p>
<a href="#services" class="btn">Explore</a>
</div>

<section id="services">
<h2>Our Services</h2>
<div class="services">

<div class="card">
<h3>Video Editing</h3>
<p>High quality editing</p>
<div class="price">₹799</div>
</div>

<div class="card">
<h3>Thumbnail Design</h3>
<p>High CTR thumbnails</p>
<div class="price">₹149</div>
</div>

<div class="card">
<h3>Website Development</h3>
<p>Modern websites</p>
<div class="price">₹1999+</div>
</div>

</div>
</section>

<section>
<h2>Our Work</h2>
<div class="portfolio">

<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
<img src="https://images.unsplash.com/photo-1508780709619-79562169bc64">

</div>
</section>

<footer>
<p>© 2026 PixelHub</p>
</footer>

</body>
</html>
